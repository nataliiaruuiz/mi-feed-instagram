<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Feed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      background: #0f0f0f;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    #refresh-btn {
      background: #222;
      border: none;
      color: #f0f0f0;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #refresh-btn:active { background: #333; }

    #status {
      text-align: center;
      padding: 40px 16px;
      color: #666;
      font-size: 14px;
    }

    #error-msg {
      display: none;
      margin: 16px;
      padding: 14px 16px;
      background: #1a0a0a;
      border: 1px solid #5c1a1a;
      border-radius: 10px;
      color: #ff6b6b;
      font-size: 13px;
      line-height: 1.5;
    }

    /* Sección por cuenta */
    .account-section {
      margin-bottom: 8px;
    }

    .account-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
    }

    .account-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #aaa;
      flex-shrink: 0;
      text-transform: uppercase;
    }

    .account-name {
      font-size: 14px;
      font-weight: 600;
      color: #ccc;
    }

    .account-count {
      font-size: 12px;
      color: #555;
      margin-left: auto;
    }

    /* Grid de posts */
    .posts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      padding: 0 2px;
    }

    .post-card {
      position: relative;
      background: #1a1a1a;
      overflow: hidden;
      cursor: default;
    }

    .post-card:active .post-overlay { opacity: 1; }

    .post-img-wrap {
      position: relative;
      padding-top: 100%; /* cuadrado */
      background: #1a1a1a;
    }

    .post-img-wrap img {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .post-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      align-items: flex-end;
      padding: 10px;
    }

    .post-caption-overlay {
      font-size: 11px;
      color: #fff;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-info {
      padding: 8px 10px 10px;
    }

    .post-caption {
      font-size: 12px;
      color: #bbb;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 4px;
    }

    .post-date {
      font-size: 11px;
      color: #555;
    }

    .divider {
      height: 1px;
      background: #1e1e1e;
      margin: 8px 0;
    }

    .empty-account {
      padding: 12px 16px;
      color: #555;
      font-size: 13px;
    }

    /* Estado de carga por cuenta */
    .account-loading {
      padding: 12px 16px;
      color: #555;
      font-size: 13px;
    }

    /* Última actualización */
    #last-update {
      text-align: center;
      padding: 20px 16px;
      color: #444;
      font-size: 12px;
    }
  </style>
</head>
<body>

<header>
  <h1>📋 Mi Feed</h1>
  <button id="refresh-btn" onclick="cargarTodo()">Actualizar</button>
</header>

<div id="error-msg"></div>
<div id="status">Cargando...</div>
<div id="feed"></div>
<div id="last-update"></div>

<script>
// ================================================================
// CONFIGURACIÓN: pon aquí tus cuentas reales
// La URL base es la de tu propio bridge en Render.
// ================================================================
const BRIDGE_BASE = "https://my-rss-bridge.onrender.com";

const CUENTAS = [
  "nasa",
  // "otra_cuenta_universidad",
  // "otra_cuenta_universidad_2",
];
// ================================================================

function urlFeed(username) {
  return `${BRIDGE_BASE}/?action=display&bridge=InstagramBridge&context=Username&u=${username}&media_type=all&format=Json`;
}

function extraerImagen(item) {
  // Primero intentamos attachments (más fiable)
  if (item.attachments && item.attachments.length > 0) {
    return item.attachments[0].url;
  }
  // Si no, extraemos la img del content_html
  const match = item.content_html && item.content_html.match(/src="([^"]+)"/);
  return match ? match[1].replace(/\\/g, '') : null;
}

function extraerCaption(item) {
  // El title suele ser los primeros caracteres del caption
  return item.title || "";
}

function formatearFecha(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  const ahora = new Date();
  const diff = ahora - d;
  const mins = Math.floor(diff / 60000);
  const horas = Math.floor(diff / 3600000);
  const dias = Math.floor(diff / 86400000);
  if (mins < 60) return `hace ${mins}m`;
  if (horas < 24) return `hace ${horas}h`;
  if (dias < 7) return `hace ${dias}d`;
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
}

function renderPosts(username, items) {
  if (!items || items.length === 0) {
    return `<div class="empty-account">Sin posts recientes</div>`;
  }

  const cards = items.map(item => {
    const img = extraerImagen(item);
    const caption = extraerCaption(item);
    const fecha = formatearFecha(item.date_modified);

    const imgHtml = img
      ? `<img src="${img.replace(/\\/g, '')}" alt="" loading="lazy" onerror="this.parentElement.style.background='#222'">`
      : '';

    return `
      <div class="post-card">
        <div class="post-img-wrap">
          ${imgHtml}
          <div class="post-overlay">
            <div class="post-caption-overlay">${caption}</div>
          </div>
        </div>
        <div class="post-info">
          <div class="post-caption">${caption}</div>
          <div class="post-date">${fecha}</div>
        </div>
      </div>
    `;
  }).join('');

  return `<div class="posts-grid">${cards}</div>`;
}

async function fetchCuenta(username) {
  const url = urlFeed(username);
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`HTTP ${resp.status} para @${username}`);
  const data = await resp.json();
  return data.items || [];
}

async function cargarTodo() {
  const feed = document.getElementById('feed');
  const status = document.getElementById('status');
  const errorMsg = document.getElementById('error-msg');
  const lastUpdate = document.getElementById('last-update');

  feed.innerHTML = '';
  status.textContent = 'Cargando...';
  errorMsg.style.display = 'none';
  lastUpdate.textContent = '';

  const errores = [];

  for (let i = 0; i < CUENTAS.length; i++) {
    const username = CUENTAS[i];

    // Mostramos el bloque de la cuenta enseguida, con indicador de carga
    const section = document.createElement('div');
    section.className = 'account-section';
    section.innerHTML = `
      <div class="account-header">
        <div class="account-avatar">${username[0]}</div>
        <div class="account-name">@${username}</div>
      </div>
      <div class="account-loading" id="loading-${username}">Cargando posts...</div>
      ${i < CUENTAS.length - 1 ? '<div class="divider"></div>' : ''}
    `;
    feed.appendChild(section);
    status.textContent = '';

    try {
      const items = await fetchCuenta(username);
      const loadingEl = document.getElementById(`loading-${username}`);
      if (loadingEl) loadingEl.outerHTML = renderPosts(username, items);

      // Actualizar contador
      const header = section.querySelector('.account-header');
      if (header && items.length > 0) {
        const count = document.createElement('span');
        count.className = 'account-count';
        count.textContent = `${items.length} posts`;
        header.appendChild(count);
      }
    } catch (e) {
      const loadingEl = document.getElementById(`loading-${username}`);
      if (loadingEl) {
        loadingEl.textContent = `No se pudo cargar @${username}`;
        loadingEl.style.color = '#ff6b6b';
      }
      errores.push(`@${username}: ${e.message}`);
    }

    // Pequeña pausa entre cuentas para no saturar el bridge
    if (i < CUENTAS.length - 1) await new Promise(r => setTimeout(r, 1500));
  }

  if (errores.length > 0) {
    errorMsg.style.display = 'block';
    errorMsg.innerHTML = `⚠️ Algunos feeds fallaron:<br>${errores.join('<br>')}`;
  }

  lastUpdate.textContent = `Última actualización: ${new Date().toLocaleTimeString('es-ES')}`;
}

// Arrancamos al cargar la página
cargarTodo();
</script>
</body>
</html>
