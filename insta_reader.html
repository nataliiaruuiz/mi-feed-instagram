<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Feed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid #222;
      position: sticky; top: 0;
      background: #0f0f0f;
      z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
    }
    header h1 { font-size: 18px; font-weight: 600; }

    #refresh-btn {
      background: #222; border: none; color: #f0f0f0;
      padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer;
    }
    #refresh-btn:active { background: #333; }

    #status { text-align: center; padding: 40px 16px; color: #666; font-size: 14px; }

    #error-msg {
      display: none; margin: 16px; padding: 14px 16px;
      background: #1a0a0a; border: 1px solid #5c1a1a;
      border-radius: 10px; color: #ff6b6b; font-size: 13px; line-height: 1.5;
    }

    .account-section { margin-bottom: 8px; }

    .account-header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 10px;
    }
    .account-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #333; display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #aaa;
      flex-shrink: 0; text-transform: uppercase;
    }
    .account-name { font-size: 14px; font-weight: 600; color: #ccc; }
    .account-count { font-size: 12px; color: #555; margin-left: auto; }

    .posts-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 2px; padding: 0 2px;
    }

    .post-card {
      background: #1a1a1a; overflow: hidden;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .post-card:active { opacity: 0.75; }

    .post-img-wrap {
      position: relative; padding-top: 100%; background: #1a1a1a;
    }
    .post-img-wrap img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; object-fit: cover;
    }

    /* Placeholder para vídeos y carruseles */
    .post-placeholder {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: #555;
    }
    .post-placeholder .placeholder-icon { font-size: 28px; }
    .post-placeholder .placeholder-label { font-size: 11px; color: #444; }

    /* Badge de tipo en esquina */
    .post-badge {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,0.7);
      border-radius: 4px; padding: 2px 5px;
      font-size: 11px; color: #ccc;
    }

    .post-info { padding: 8px 10px 10px; }
    .post-caption {
      font-size: 12px; color: #bbb; line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px;
    }
    .post-date { font-size: 11px; color: #555; }

    .divider { height: 1px; background: #1e1e1e; margin: 8px 0; }
    .empty-account { padding: 12px 16px; color: #555; font-size: 13px; }
    .account-loading { padding: 12px 16px; color: #555; font-size: 13px; }

    #last-update { text-align: center; padding: 20px 16px; color: #444; font-size: 12px; }

    /* ── MODAL ── */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 100; overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    #modal-overlay.open { display: block; }

    #modal-box {
      margin: 0 auto; max-width: 500px;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    #modal-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px;
      position: sticky; top: 0;
      background: rgba(0,0,0,0.97); z-index: 101;
      border-bottom: 1px solid #1a1a1a;
    }
    #modal-account { display: flex; align-items: center; gap: 10px; }
    #modal-avatar {
      width: 30px; height: 30px; border-radius: 50%; background: #333;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #aaa; text-transform: uppercase; flex-shrink: 0;
    }
    #modal-username { font-size: 13px; font-weight: 600; color: #ddd; }
    #modal-date { font-size: 11px; color: #555; margin-top: 1px; }

    #modal-close {
      background: #222; border: none; color: #aaa;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }

    #modal-tipo {
      padding: 8px 16px 0;
      font-size: 12px; color: #555;
    }

    #modal-img-wrap { width: 100%; background: #111; }
    #modal-img-wrap img { width: 100%; display: block; object-fit: contain; }

    /* Placeholder del modal para vídeo/carrusel */
    #modal-placeholder {
      display: none;
      width: 100%; padding: 48px 16px;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; background: #111;
    }
    #modal-placeholder .ph-icon { font-size: 48px; }
    #modal-placeholder .ph-text { font-size: 14px; color: #555; text-align: center; line-height: 1.5; }

    #modal-caption {
      padding: 16px; font-size: 14px; color: #ccc;
      line-height: 1.7; white-space: pre-wrap; word-break: break-word;
      flex: 1; padding-bottom: 48px;
    }
  </style>
</head>
<body>

<header>
  <h1>📋 Mi Feed</h1>
  <button id="refresh-btn" onclick="cargarTodo()">Actualizar</button>
</header>

<div id="error-msg"></div>
<div id="status">Cargando...</div>
<div id="feed"></div>
<div id="last-update"></div>

<!-- MODAL -->
<div id="modal-overlay" onclick="cerrarModal(event)">
  <div id="modal-box">
    <div id="modal-topbar">
      <div id="modal-account">
        <div id="modal-avatar"></div>
        <div>
          <div id="modal-username"></div>
          <div id="modal-date"></div>
        </div>
      </div>
      <button id="modal-close" onclick="cerrarModalDirecto()">×</button>
    </div>
    <div id="modal-tipo"></div>
    <div id="modal-img-wrap">
      <img id="modal-img" src="" alt="" onerror="mostrarPlaceholderModal()">
    </div>
    <div id="modal-placeholder">
      <div class="ph-icon" id="modal-ph-icon"></div>
      <div class="ph-text" id="modal-ph-text"></div>
    </div>
    <div id="modal-caption"></div>
  </div>
</div>

<script>
// ================================================================
// CONFIGURACIÓN
// ================================================================
const BRIDGE_BASE = "https://my-rss-bridge.onrender.com";

const CUENTAS = [
  "nasa",
  // "cuenta_universidad_1",
  // "cuenta_universidad_2",
];
// ================================================================

function urlFeed(username) {
  const feedUrl = `${BRIDGE_BASE}/?action=display&bridge=InstagramBridge&context=Username&u=${username}&media_type=all&format=Json`;
  return `https://corsproxy.io/?url=${encodeURIComponent(feedUrl)}`;
}

function tipoPost(item) {
  const html = item.content_html || '';
  if (html.includes('<video') || html.includes('video')) return 'video';
  const imgs = html.match(/<img/g);
  if (imgs && imgs.length > 1) return 'carrusel';
  if (item.attachments && item.attachments.length > 1) return 'carrusel';
  return 'foto';
}

function extraerImagen(item) {
  if (item.attachments && item.attachments.length > 0) {
    return item.attachments[0].url.replace(/\\/g, '');
  }
  const html = item.content_html || '';
  const m = html.match(/src=\\"([^\\"]+)\\"/);
  if (m) return m[1].replace(/\\/g, '');
  const m2 = html.match(/src="([^"]+\/media[^"]+)"/);
  if (m2) return m2[1];
  const m3 = html.match(/src="([^"]+)"/);
  if (m3) return m3[1];
  return null;
}

function extraerCaptionLimpio(item) {
  if (!item.content_html) return item.title || '';
  const tmp = document.createElement('div');
  tmp.innerHTML = item.content_html;
  const primerA = tmp.querySelector('a');
  if (primerA && primerA.querySelector('img')) primerA.remove();
  return tmp.innerText.trim();
}

function formatearFecha(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const ahora = new Date();
  const diff = ahora - d;
  const mins = Math.floor(diff / 60000);
  const horas = Math.floor(diff / 3600000);
  const dias = Math.floor(diff / 86400000);
  if (mins < 60) return `hace ${mins}m`;
  if (horas < 24) return `hace ${horas}h`;
  if (dias < 7) return `hace ${dias}d`;
  return d.toLocaleDateString('es-ES', { day: 'numeric', month: 'short' });
}

function mostrarPlaceholderModal() {
  document.getElementById('modal-img-wrap').style.display = 'none';
  document.getElementById('modal-placeholder').style.display = 'flex';
}

const datosCache = {};

function abrirModal(username, idx) {
  const item = datosCache[username]?.[idx];
  if (!item) return;

  const img = extraerImagen(item);
  const caption = extraerCaptionLimpio(item);
  const fecha = formatearFecha(item.date_modified);
  const tipo = tipoPost(item);

  document.getElementById('modal-avatar').textContent = username[0] || '?';
  document.getElementById('modal-username').textContent = `@${username}`;
  document.getElementById('modal-date').textContent = fecha;
  document.getElementById('modal-caption').textContent = caption;

  // Badge de tipo
  const tipoEl = document.getElementById('modal-tipo');
  if (tipo === 'video') tipoEl.textContent = '🎥 Vídeo';
  else if (tipo === 'carrusel') tipoEl.textContent = '🖼️ Carrusel · solo se muestra la primera imagen';
  else tipoEl.textContent = '';

  const imgWrap = document.getElementById('modal-img-wrap');
  const placeholder = document.getElementById('modal-placeholder');
  const modalImg = document.getElementById('modal-img');

  // Reset estado anterior
  imgWrap.style.display = 'block';
  placeholder.style.display = 'none';

  if (tipo === 'video') {
    imgWrap.style.display = 'none';
    placeholder.style.display = 'flex';
    document.getElementById('modal-ph-icon').textContent = '🎥';
    document.getElementById('modal-ph-text').textContent = 'Este post es un vídeo.\nAbre Instagram para verlo.';
  } else if (img) {
    modalImg.src = img;
  } else {
    mostrarPlaceholderModal();
    document.getElementById('modal-ph-icon').textContent = '🖼️';
    document.getElementById('modal-ph-text').textContent = 'Imagen no disponible';
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarModalDirecto() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function cerrarModal(e) {
  if (e.target === document.getElementById('modal-overlay')) cerrarModalDirecto();
}

window.addEventListener('popstate', cerrarModalDirecto);

function renderPosts(username, items) {
  if (!items || items.length === 0) {
    return `<div class="empty-account">Sin posts recientes</div>`;
  }

  return `<div class="posts-grid">${items.map((item, idx) => {
    const img = extraerImagen(item);
    const tipo = tipoPost(item);
    const caption = item.title || '';
    const fecha = formatearFecha(item.date_modified);

    let contenidoImagen;
    if (tipo === 'video') {
      contenidoImagen = `
        <div class="post-placeholder">
          <div class="placeholder-icon">🎥</div>
          <div class="placeholder-label">Vídeo</div>
        </div>`;
    } else if (img) {
      contenidoImagen = `<img src="${img}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="post-placeholder" style="display:none">
          <div class="placeholder-icon">${tipo === 'carrusel' ? '🖼️' : '📷'}</div>
          <div class="placeholder-label">${tipo === 'carrusel' ? 'Carrusel' : ''}</div>
        </div>`;
    } else {
      contenidoImagen = `
        <div class="post-placeholder">
          <div class="placeholder-icon">📷</div>
        </div>`;
    }

    const badge = tipo !== 'foto' ? `<div class="post-badge">${tipo === 'video' ? '▶' : '⊞'}</div>` : '';

    return `
      <div class="post-card" onclick="abrirModal('${username}', ${idx})">
        <div class="post-img-wrap">
          ${contenidoImagen}
          ${badge}
        </div>
        <div class="post-info">
          <div class="post-caption">${caption}</div>
          <div class="post-date">${fecha}</div>
        </div>
      </div>`;
  }).join('')}</div>`;
}

async function fetchCuenta(username) {
  const resp = await fetch(urlFeed(username));
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const data = await resp.json();
  return data.items || [];
}

async function cargarTodo() {
  const feed = document.getElementById('feed');
  const status = document.getElementById('status');
  const errorMsg = document.getElementById('error-msg');
  const lastUpdate = document.getElementById('last-update');

  feed.innerHTML = '';
  status.textContent = 'Cargando...';
  errorMsg.style.display = 'none';
  lastUpdate.textContent = '';

  const errores = [];

  for (let i = 0; i < CUENTAS.length; i++) {
    const username = CUENTAS[i];
    const section = document.createElement('div');
    section.className = 'account-section';
    section.innerHTML = `
      <div class="account-header">
        <div class="account-avatar">${username[0]}</div>
        <div class="account-name">@${username}</div>
      </div>
      <div class="account-loading" id="loading-${username}">Cargando...</div>
      ${i < CUENTAS.length - 1 ? '<div class="divider"></div>' : ''}
    `;
    feed.appendChild(section);
    status.textContent = '';

    try {
      const items = await fetchCuenta(username);
      datosCache[username] = items;
      const el = document.getElementById(`loading-${username}`);
      if (el) el.outerHTML = renderPosts(username, items);
      const header = section.querySelector('.account-header');
      if (header && items.length > 0) {
        const count = document.createElement('span');
        count.className = 'account-count';
        count.textContent = `${items.length} posts`;
        header.appendChild(count);
      }
    } catch (e) {
      const el = document.getElementById(`loading-${username}`);
      if (el) { el.textContent = `No se pudo cargar @${username}`; el.style.color = '#ff6b6b'; }
      errores.push(`@${username}: ${e.message}`);
    }

    if (i < CUENTAS.length - 1) await new Promise(r => setTimeout(r, 1500));
  }

  if (errores.length > 0) {
    errorMsg.style.display = 'block';
    errorMsg.innerHTML = `⚠️ Algunos feeds fallaron:<br>${errores.join('<br>')}`;
  }
  lastUpdate.textContent = `Actualizado: ${new Date().toLocaleTimeString('es-ES')}`;
}

cargarTodo();
</script>
</body>
</html>
