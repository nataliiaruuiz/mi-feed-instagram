<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Feed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f; color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; padding-bottom: 80px;
    }

    /* HEADER */
    header {
      padding: 18px 16px 0;
      position: sticky; top: 0; background: #0f0f0f; z-index: 10;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    #refresh-btn {
      background: #222; border: none; color: #f0f0f0;
      padding: 8px 14px; border-radius: 20px; font-size: 13px; cursor: pointer;
    }
    #refresh-btn:active { background: #333; }
    #refresh-btn:disabled { opacity: 0.4; }

    /* TABS */
    .tabs {
      display: flex; border-bottom: 1px solid #222;
    }
    .tab-btn {
      flex: 1; background: none; border: none; color: #666;
      padding: 10px 0; font-size: 14px; font-weight: 500;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active { color: #f0f0f0; border-bottom-color: #f0f0f0; }

    /* PANELS */
    .panel { display: none; }
    .panel.active { display: block; }

    /* FEED PANEL */
    #status { text-align: center; padding: 40px 16px; color: #666; font-size: 14px; }
    #error-msg {
      display: none; margin: 16px; padding: 14px 16px;
      background: #1a0a0a; border: 1px solid #5c1a1a;
      border-radius: 10px; color: #ff6b6b; font-size: 13px; line-height: 1.5;
    }
    .account-section { margin-bottom: 8px; }
    .account-header {
      display: flex; align-items: center; gap: 10px; padding: 14px 16px 10px;
    }
    .account-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: #333;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: #aaa;
      flex-shrink: 0; text-transform: uppercase;
    }
    .account-name { font-size: 14px; font-weight: 600; color: #ccc; }
    .account-count { font-size: 12px; color: #555; margin-left: auto; }
    .posts-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; padding: 0 2px;
    }
    .post-card {
      background: #1a1a1a; overflow: hidden;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .post-card:active { opacity: 0.75; }
    .post-img-wrap { position: relative; padding-top: 100%; background: #1a1a1a; }
    .post-img-wrap img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;
    }
    .post-placeholder {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
    }
    .post-placeholder .placeholder-icon { font-size: 28px; }
    .post-placeholder .placeholder-label { font-size: 11px; color: #444; }
    .post-badge {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,0.7); border-radius: 4px;
      padding: 2px 5px; font-size: 11px; color: #ccc;
    }
    .post-info { padding: 8px 10px 10px; }
    .post-caption {
      font-size: 12px; color: #bbb; line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px;
    }
    .post-caption.traduciendo { opacity: 0.5; font-style: italic; }
    .post-date { font-size: 11px; color: #555; }
    .divider { height: 1px; background: #1e1e1e; margin: 8px 0; }
    .empty-account { padding: 12px 16px; color: #555; font-size: 13px; }
    .account-loading { padding: 12px 16px; color: #555; font-size: 13px; }
    #last-update { text-align: center; padding: 20px 16px; color: #444; font-size: 12px; }

    /* SETTINGS PANEL */
    #panel-settings { padding: 20px 16px; }
    #panel-settings h2 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    #panel-settings p { font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 16px; }

    .account-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }

    .account-row {
      display: flex; align-items: center; gap: 10px;
      background: #1a1a1a; border-radius: 10px; padding: 10px 12px;
    }
    .account-row .at { color: #666; font-size: 14px; }
    .account-row input {
      flex: 1; background: none; border: none; color: #f0f0f0;
      font-size: 14px; outline: none; padding: 0;
    }
    .account-row input::placeholder { color: #444; }
    .delete-btn {
      background: none; border: none; color: #555;
      font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    .delete-btn:active { color: #ff6b6b; }

    .add-btn {
      width: 100%; background: #1a1a1a; border: 1px dashed #333;
      color: #666; padding: 12px; border-radius: 10px;
      font-size: 14px; cursor: pointer; margin-bottom: 20px;
    }
    .add-btn:active { background: #222; }

    .save-btn {
      width: 100%; background: #f0f0f0; border: none;
      color: #0f0f0f; padding: 14px; border-radius: 12px;
      font-size: 15px; font-weight: 600; cursor: pointer;
    }
    .save-btn:active { opacity: 0.8; }

    .settings-feedback {
      display: none; text-align: center; margin-top: 12px;
      font-size: 13px; color: #4caf50;
    }

    /* MODAL */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.95); z-index: 100;
      overflow-y: auto; -webkit-overflow-scrolling: touch;
    }
    #modal-overlay.open { display: block; }
    #modal-box { margin: 0 auto; max-width: 500px; min-height: 100vh; display: flex; flex-direction: column; }
    #modal-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 10px; position: sticky; top: 0;
      background: rgba(0,0,0,0.97); z-index: 101; border-bottom: 1px solid #1a1a1a;
    }
    #modal-account { display: flex; align-items: center; gap: 10px; }
    #modal-avatar {
      width: 30px; height: 30px; border-radius: 50%; background: #333;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: #aaa; text-transform: uppercase; flex-shrink: 0;
    }
    #modal-username { font-size: 13px; font-weight: 600; color: #ddd; }
    #modal-date { font-size: 11px; color: #555; margin-top: 1px; }
    #modal-close {
      background: #222; border: none; color: #aaa;
      width: 32px; height: 32px; border-radius: 50%;
      font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    #modal-tipo { padding: 8px 16px 0; font-size: 12px; color: #555; }
    #modal-img-wrap { width: 100%; background: #111; }
    #modal-img-wrap img { width: 100%; display: block; object-fit: contain; }
    #modal-placeholder {
      display: none; width: 100%; padding: 48px 16px;
      flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; background: #111;
    }
    #modal-placeholder .ph-icon { font-size: 48px; }
    #modal-placeholder .ph-text { font-size: 14px; color: #555; text-align: center; line-height: 1.5; }
    #modal-caption {
      padding: 16px; font-size: 14px; color: #ccc;
      line-height: 1.7; white-space: pre-wrap; word-break: break-word;
      flex: 1; padding-bottom: 48px;
    }
    #modal-caption.traduciendo { opacity: 0.5; font-style: italic; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>My Feed</h1>
    <button id="refresh-btn" onclick="cargarTodo()">Refresh</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="cambiarTab('feed')">Feed</button>
    <button class="tab-btn" onclick="cambiarTab('settings')">Accounts</button>
  </div>
</header>

<!-- PANEL FEED -->
<div id="panel-feed" class="panel active">
  <div id="error-msg"></div>
  <div id="status">Loading...</div>
  <div id="feed"></div>
  <div id="last-update"></div>
</div>

<!-- PANEL SETTINGS -->
<div id="panel-settings" class="panel">
  <h2>Accounts to follow</h2>
  <p>Add the Instagram usernames you want to see. Changes take effect when you press Save and then Refresh.</p>
  <div class="account-list" id="account-list"></div>
  <button class="add-btn" onclick="agregarFila()">+ Add account</button>
  <button class="save-btn" onclick="guardarCuentas()">Save</button>
  <div class="settings-feedback" id="settings-feedback">Saved! Go to Feed and press Refresh.</div>
</div>

<!-- MODAL -->
<div id="modal-overlay" onclick="cerrarModal(event)">
  <div id="modal-box">
    <div id="modal-topbar">
      <div id="modal-account">
        <div id="modal-avatar"></div>
        <div>
          <div id="modal-username"></div>
          <div id="modal-date"></div>
        </div>
      </div>
      <button id="modal-close" onclick="cerrarModalDirecto()">x</button>
    </div>
    <div id="modal-tipo"></div>
    <div id="modal-img-wrap">
      <img id="modal-img" src="" alt="" onerror="mostrarPlaceholderModal()">
    </div>
    <div id="modal-placeholder">
      <div class="ph-icon" id="modal-ph-icon"></div>
      <div class="ph-text" id="modal-ph-text"></div>
    </div>
    <div id="modal-caption"></div>
  </div>
</div>

<script>
// ================================================================
// CONFIG: cuentas por defecto (se sobreescriben con lo guardado)
// ================================================================
const BRIDGE_BASE = "https://my-rss-bridge.onrender.com";
const CUENTAS_DEFAULT = ["nasa"];
const DEEPL_KEY = "fd1ab0fa-7f67-4051-8c3e-844fd4d3060d:fx";
const DEEPL_URL = "https://api-free.deepl.com/v2/translate";
const IDIOMA_DESTINO = "EN";
const STORAGE_KEY = "mifeed_cuentas";
// ================================================================

// Lee cuentas desde localStorage, o usa las de defecto
function leerCuentas() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  return [...CUENTAS_DEFAULT];
}

function guardarCuentas() {
  const filas = document.querySelectorAll('.account-input');
  const cuentas = Array.from(filas)
    .map(i => i.value.trim().replace(/^@/, ''))
    .filter(v => v !== '');

  if (cuentas.length === 0) {
    alert('Add at least one account.');
    return;
  }

  localStorage.setItem(STORAGE_KEY, JSON.stringify(cuentas));
  const fb = document.getElementById('settings-feedback');
  fb.style.display = 'block';
  setTimeout(() => fb.style.display = 'none', 3000);
}

function agregarFila(valor = '') {
  const list = document.getElementById('account-list');
  const row = document.createElement('div');
  row.className = 'account-row';
  row.innerHTML = `
    <span class="at">@</span>
    <input class="account-input" type="text" placeholder="username" value="${valor}"
      autocapitalize="none" autocorrect="off" spellcheck="false">
    <button class="delete-btn" onclick="this.parentElement.remove()">x</button>
  `;
  list.appendChild(row);
  if (!valor) row.querySelector('input').focus();
}

function renderSettings() {
  document.getElementById('account-list').innerHTML = '';
  leerCuentas().forEach(c => agregarFila(c));
}

// TABS
function cambiarTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'feed') || (i === 1 && tab === 'settings'));
  });
  document.getElementById('panel-feed').classList.toggle('active', tab === 'feed');
  document.getElementById('panel-settings').classList.toggle('active', tab === 'settings');
  if (tab === 'settings') renderSettings();
}

// TRADUCCION
const cacheTraduccion = {};
const datosCache = {};

async function traducir(texto) {
  if (!texto || texto.trim() === '') return texto;
  if (cacheTraduccion[texto]) return cacheTraduccion[texto];
  try {
    const resp = await fetch(DEEPL_URL, {
      method: 'POST',
      headers: {
        'Authorization': `DeepL-Auth-Key ${DEEPL_KEY}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ text: [texto], target_lang: IDIOMA_DESTINO })
    });
    if (!resp.ok) throw new Error(`DeepL ${resp.status}`);
    const data = await resp.json();
    const traducido = data.translations?.[0]?.text || texto;
    cacheTraduccion[texto] = traducido;
    return traducido;
  } catch (e) {
    console.warn('DeepL error:', e.message);
    return texto;
  }
}

async function traducirItemsEnSegundoPlano(username, items) {
  for (let idx = 0; idx < items.length; idx++) {
    const item = items[idx];
    const [captionTrad, tituloTrad] = await Promise.all([
      traducir(extraerCaptionLimpio(item)),
      traducir(item.title || ''),
    ]);
    item._captionTraducido = captionTrad;
    item._tituloTraducido = tituloTrad;

    const captionEl = document.getElementById(`caption-${username}-${idx}`);
    if (captionEl) {
      captionEl.textContent = tituloTrad;
      captionEl.classList.remove('traduciendo');
    }

    const modalCaption = document.getElementById('modal-caption');
    if (
      modalCaption &&
      document.getElementById('modal-overlay').classList.contains('open') &&
      modalCaption.dataset.username === username &&
      parseInt(modalCaption.dataset.idx) === idx
    ) {
      modalCaption.textContent = captionTrad;
      modalCaption.classList.remove('traduciendo');
    }

    await new Promise(r => setTimeout(r, 350));
  }
}

// HELPERS
function urlFeed(username) {
  const feedUrl = `${BRIDGE_BASE}/?action=display&bridge=InstagramBridge&context=Username&u=${username}&media_type=all&format=Json`;
  return `https://corsproxy.io/?url=${encodeURIComponent(feedUrl)}`;
}

function tipoPost(item) {
  const html = item.content_html || '';
  if (html.includes('<video')) return 'video';
  const imgs = html.match(/<img/g);
  if (imgs && imgs.length > 1) return 'carrusel';
  if (item.attachments && item.attachments.length > 1) return 'carrusel';
  return 'foto';
}

function extraerImagen(item) {
  if (item.attachments && item.attachments.length > 0)
    return item.attachments[0].url.replace(/\\/g, '');
  const html = item.content_html || '';
  const m = html.match(/src=\\"([^\\"]+)\\"/);
  if (m) return m[1].replace(/\\/g, '');
  const m2 = html.match(/src="([^"]+\/media[^"]+)"/);
  if (m2) return m2[1];
  const m3 = html.match(/src="([^"]+)"/);
  if (m3) return m3[1];
  return null;
}

function extraerCaptionLimpio(item) {
  if (!item.content_html) return item.title || '';
  const tmp = document.createElement('div');
  tmp.innerHTML = item.content_html;
  const primerA = tmp.querySelector('a');
  if (primerA && primerA.querySelector('img')) primerA.remove();
  return tmp.innerText.trim();
}

function formatearFecha(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const diff = new Date() - d;
  const mins = Math.floor(diff / 60000);
  const horas = Math.floor(diff / 3600000);
  const dias = Math.floor(diff / 86400000);
  if (mins < 60) return `${mins}m ago`;
  if (horas < 24) return `${horas}h ago`;
  if (dias < 7) return `${dias}d ago`;
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

// MODAL
function mostrarPlaceholderModal() {
  document.getElementById('modal-img-wrap').style.display = 'none';
  document.getElementById('modal-placeholder').style.display = 'flex';
}

function abrirModal(username, idx) {
  const item = datosCache[username]?.[idx];
  if (!item) return;

  const img = extraerImagen(item);
  const caption = item._captionTraducido || extraerCaptionLimpio(item);
  const tipo = tipoPost(item);
  const estaTraduciendo = !item._captionTraducido;

  document.getElementById('modal-avatar').textContent = username[0] || '?';
  document.getElementById('modal-username').textContent = `@${username}`;
  document.getElementById('modal-date').textContent = formatearFecha(item.date_modified);

  const modalCaption = document.getElementById('modal-caption');
  modalCaption.textContent = estaTraduciendo ? caption + '\n\n(translating...)' : caption;
  modalCaption.dataset.username = username;
  modalCaption.dataset.idx = idx;
  modalCaption.classList.toggle('traduciendo', estaTraduciendo);

  const tipoEl = document.getElementById('modal-tipo');
  tipoEl.textContent = tipo === 'video' ? '🎥 Video'
    : tipo === 'carrusel' ? '🖼 Carousel · only first image shown' : '';

  const imgWrap = document.getElementById('modal-img-wrap');
  const placeholder = document.getElementById('modal-placeholder');
  imgWrap.style.display = 'block';
  placeholder.style.display = 'none';

  if (tipo === 'video') {
    imgWrap.style.display = 'none';
    placeholder.style.display = 'flex';
    document.getElementById('modal-ph-icon').textContent = '🎥';
    document.getElementById('modal-ph-text').textContent = 'This post is a video.\nOpen Instagram to watch it.';
  } else if (img) {
    document.getElementById('modal-img').src = img;
  } else {
    mostrarPlaceholderModal();
    document.getElementById('modal-ph-icon').textContent = '🖼';
    document.getElementById('modal-ph-text').textContent = 'Image not available';
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function cerrarModalDirecto() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function cerrarModal(e) {
  if (e.target === document.getElementById('modal-overlay')) cerrarModalDirecto();
}

window.addEventListener('popstate', cerrarModalDirecto);

// RENDER
function renderPosts(username, items) {
  if (!items || items.length === 0)
    return `<div class="empty-account">No recent posts</div>`;

  return `<div class="posts-grid">${items.map((item, idx) => {
    const img = extraerImagen(item);
    const tipo = tipoPost(item);
    const titulo = item._tituloTraducido || item.title || '';
    const fecha = formatearFecha(item.date_modified);

    let contenidoImagen;
    if (tipo === 'video') {
      contenidoImagen = `<div class="post-placeholder">
        <div class="placeholder-icon">🎥</div>
        <div class="placeholder-label">Video</div></div>`;
    } else if (img) {
      contenidoImagen = `<img src="${img}" alt="" loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="post-placeholder" style="display:none">
          <div class="placeholder-icon">${tipo === 'carrusel' ? '🖼' : '📷'}</div></div>`;
    } else {
      contenidoImagen = `<div class="post-placeholder"><div class="placeholder-icon">📷</div></div>`;
    }

    const badge = tipo !== 'foto'
      ? `<div class="post-badge">${tipo === 'video' ? '▶' : '⊞'}</div>` : '';

    return `<div class="post-card" onclick="abrirModal('${username}', ${idx})">
      <div class="post-img-wrap">${contenidoImagen}${badge}</div>
      <div class="post-info">
        <div class="post-caption ${item._tituloTraducido ? '' : 'traduciendo'}"
          id="caption-${username}-${idx}">${titulo}</div>
        <div class="post-date">${fecha}</div>
      </div></div>`;
  }).join('')}</div>`;
}

async function fetchCuenta(username) {
  const resp = await fetch(urlFeed(username));
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const data = await resp.json();
  return data.items || [];
}

async function cargarTodo() {
  const CUENTAS = leerCuentas();
  const feed = document.getElementById('feed');
  const status = document.getElementById('status');
  const errorMsg = document.getElementById('error-msg');
  const btn = document.getElementById('refresh-btn');

  feed.innerHTML = '';
  status.textContent = 'Loading...';
  errorMsg.style.display = 'none';
  document.getElementById('last-update').textContent = '';
  btn.disabled = true;

  const errores = [];

  for (let i = 0; i < CUENTAS.length; i++) {
    const username = CUENTAS[i];
    const section = document.createElement('div');
    section.className = 'account-section';
    section.innerHTML = `
      <div class="account-header">
        <div class="account-avatar">${username[0]}</div>
        <div class="account-name">@${username}</div>
      </div>
      <div class="account-loading" id="loading-${username}">Loading...</div>
      ${i < CUENTAS.length - 1 ? '<div class="divider"></div>' : ''}
    `;
    feed.appendChild(section);
    status.textContent = '';

    try {
      const items = await fetchCuenta(username);
      datosCache[username] = items;
      const el = document.getElementById(`loading-${username}`);
      if (el) el.outerHTML = renderPosts(username, items);
      const header = section.querySelector('.account-header');
      if (header && items.length > 0) {
        const count = document.createElement('span');
        count.className = 'account-count';
        count.textContent = `${items.length} posts`;
        header.appendChild(count);
      }
      traducirItemsEnSegundoPlano(username, items);
    } catch (e) {
      const el = document.getElementById(`loading-${username}`);
      if (el) { el.textContent = `Could not load @${username}`; el.style.color = '#ff6b6b'; }
      errores.push(`@${username}: ${e.message}`);
    }

    if (i < CUENTAS.length - 1) await new Promise(r => setTimeout(r, 1500));
  }

  if (errores.length > 0) {
    errorMsg.style.display = 'block';
    errorMsg.innerHTML = `Warning: some feeds failed:<br>${errores.join('<br>')}`;
  }
  document.getElementById('last-update').textContent =
    `Updated: ${new Date().toLocaleTimeString('en-GB')}`;
  btn.disabled = false;
}

cargarTodo();
</script>
</body>
</html>
